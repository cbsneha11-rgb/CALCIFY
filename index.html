<!DOCTYPE html>
<html>
<head>
    <title>Pastel Calculator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#ffd6e7,#d6f0ff,#e7d6ff);
        }

        .calculator{
            background:rgba(255,255,255,0.8);
            backdrop-filter:blur(10px);
            padding:25px;
            border-radius:25px;
            box-shadow:0 8px 30px rgba(0,0,0,0.15);
        }

        #display{
            width:100%;
            height:70px;
            border:none;
            border-radius:15px;
            margin-bottom:15px;
            text-align:right;
            font-size:30px;
            padding-right:15px;
            background:#fff;
            color:#555;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(4,70px);
            gap:12px;
        }

        button{
            height:65px;
            border:none;
            border-radius:18px;
            font-size:22px;
            cursor:pointer;
            transition:0.2s;
        }

        button:hover{
            transform:scale(1.05);
        }

        .num{
            background:#fff;
        }

        .op{
            background:#ffd6e7;
        }

        .equal{
            background:#c7f0d8;
        }

        .clear{
            background:#ffe7b3;
        }

    </style>
</head>

<body>

<div class="calculator">

    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="op" onclick="appendValue('/')">÷</button>
        <button class="op" onclick="appendValue('*')">×</button>
        <button class="op" onclick="appendValue('-')">−</button>

        <button class="num" onclick="appendValue('7')">7</button>
        <button class="num" onclick="appendValue('8')">8</button>
        <button class="num" onclick="appendValue('9')">9</button>
        <button class="op" onclick="appendValue('+')">+</button>

        <button class="num" onclick="appendValue('4')">4</button>
        <button class="num" onclick="appendValue('5')">5</button>
        <button class="num" onclick="appendValue('6')">6</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="num" onclick="appendValue('1')">1</button>
        <button class="num" onclick="appendValue('2')">2</button>
        <button class="num" onclick="appendValue('3')">3</button>
        <button class="num" onclick="appendValue('.')">.</button>

        <button class="num" onclick="appendValue('0')">0</button>
    </div>

</div>

<script>

function appendValue(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function calculate(){
    try{
        document.getElementById("display").value =
        eval(document.getElementById("display").value);
    }
    catch{
        document.getElementById("display").value = "Error";
    }
}

</script>

</body>
</html>
