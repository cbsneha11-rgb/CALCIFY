<!DOCTYPE html>
<html>
<head>
<title>Sneha's Calculator ✨</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ffd6e7,#d6f0ff,#e7d6ff);
    transition:0.5s;
}

.dark{
    background:#1e1e2f;
}

.calculator{
    width: fit-content;
    background:rgba(255,255,255,0.85);
    padding:25px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    text-align:center;
}

h2{
    color:#ff69b4;
    margin-bottom:10px;
}

#display{
    width:100%;
    height:70px;
    border:none;
    border-radius:15px;
    margin-bottom:15px;
    text-align:right;
    font-size:28px;
    padding-right:15px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,70px);
    gap:10px;
    width:fit-content;
    margin:auto;
}

button{
    height:60px;
    border:none;
    border-radius:15px;
    font-size:20px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.08);
}

.num{background:white;}
.op{background:#ffd6e7;}
.equal{background:#c7f0d8;}
.clear{background:#ffe7b3;}

.toggle{
    margin-bottom:10px;
    background:#ddd;
}
</style>
</head>

<body>

<div class="calculator">

<h2>Sneha's Calculator ✨</h2>

<button class="toggle" onclick="toggleDarkMode()">
🌙 Dark Mode
</button>

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="op" onclick="appendValue('%')">%</button>
<button class="op" onclick="square()">x²</button>
<button class="op" onclick="sqrt()">√</button>

<button class="num" onclick="appendValue('7')">7</button>
<button class="num" onclick="appendValue('8')">8</button>
<button class="num" onclick="appendValue('9')">9</button>
<button class="op" onclick="appendValue('/')">÷</button>

<button class="num" onclick="appendValue('4')">4</button>
<button class="num" onclick="appendValue('5')">5</button>
<button class="num" onclick="appendValue('6')">6</button>
<button class="op" onclick="appendValue('*')">×</button>

<button class="num" onclick="appendValue('1')">1</button>
<button class="num" onclick="appendValue('2')">2</button>
<button class="num" onclick="appendValue('3')">3</button>
<button class="op" onclick="appendValue('-')">−</button>

<button class="num" onclick="appendValue('0')">0</button>
<button class="num" onclick="appendValue('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button class="op" onclick="appendValue('+')">+</button>

</div>

</div>

<script>

function appendValue(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value="";
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value="Error";
    }
}

function sqrt(){
    display.value = Math.sqrt(Number(display.value));
}

function square(){
    display.value = Number(display.value) ** 2;
}

function toggleDarkMode(){
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
